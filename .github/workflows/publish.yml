name: Publish to npm

# Two ways to trigger:
#
# A) Automatic — dispatch from GitHub UI or CLI:
#    gh workflow run publish.yml -f bump=minor
#    → bumps version, commits, tags, publishes
#
# B) Manual tag push (existing flow):
#    npm version minor          # local only
#    git push origin v1.x.x    # push tag only (NOT branch — main is protected)
#    → publish workflow fires

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed for version bump commit + tag push
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Only runs on workflow_dispatch — bumps version + pushes tag
      - name: Bump version and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "chore: release v%s"
          git push origin HEAD:main --tags

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # On workflow_dispatch the ref is the new tag set by npm version
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "❌ package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
              exit 1
            fi
          fi
          echo "✅ Publishing version $PKG_VERSION"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
