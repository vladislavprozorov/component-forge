name: Publish to npm

# Triggers when a version tag is pushed: v1.0.0, v1.2.3, etc.
# Workflow:
#   1. Merge PR into main as usual
#   2. Bump version in package.json (npm version patch|minor|major)
#   3. Push the resulting tag — this workflow fires automatically
#   4. Package is built, tested, and published to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version $PKG_VERSION matches tag $TAG_VERSION"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
